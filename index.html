<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hammad — Portfolio</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="home">
    <header class="site-header">
      <div class="container header-inner">
        <div class="brand-pic-group">
          <img class="brand-pic" src="./assets/images/placeholder-profile.svg" alt="Hammad" />
          <div class="brand-details">
            <div class="brand-name">Hammad</div>
            <p class="hero-pitch">Computer Engineer building hardware + software systems.</p>
          </div>
        </div>

        <nav class="nav">
          <a href="./index.html" aria-current="page">Home</a>
          <a href="./past-projects.html">Projects</a>
          <a href="./learning.html">Learning</a>
          <a href="./about.html">About</a>
        </nav>
      </div>
    </header>

    <main class="container" id="main">
      <section class="hero-split">
        <div class="hero-left">
          <div class="link-boxes">
            <a href="https://github.com/" target="_blank" class="link-box" title="GitHub">
              <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/github.svg" alt="GitHub" class="icon-black">
            </a>
            <a href="https://linkedin.com/" target="_blank" class="link-box" title="LinkedIn">
              <img src="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/linkedin.svg" alt="LinkedIn" class="icon-black">
            </a>
            <a href="./assets/resume.pdf" download class="link-box resume-btn">
              <span>Resume</span>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            </a>
          </div>
        </div>

        <div class="hero-visual">
          <div class="slider-stack">
            <div class="mini-label">Featured Projects</div>
            <div class="carousel">
              <div class="carousel-viewport">
                <div class="carousel-track" id="homeCarouselTrack"></div>
              </div>
              <div class="carousel-controls">
                <div class="dots" id="carouselDots"></div>
              </div>
            </div>

            <div class="mini-label">Recent Learning</div>
            <div class="carousel">
              <div class="carousel-viewport">
                <div class="carousel-track" id="learningCarouselTrack"></div>
              </div>
              <div class="carousel-controls">
                <div class="dots" id="learningDots"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div class="muted">© <span id="year"></span> Hammad</div>
      </div>
    </footer>

    <script src="./content.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
